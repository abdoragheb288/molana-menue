<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Title & Description -->
    <title>مطعم مولانا - طلب المأكولات والمشويات</title>
    <meta name="description" content="تطبيق طلب الوجبات والمشويات الفورية من مطعم مولانا - المذاق الأصيل والجودة العالية للمأكولات" />
    
    <!-- PWA Meta Elements -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="مطعم مولانا" />
    <meta name="theme-color" content="#141414" />
    
    <!-- Icons and Manifest links -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="shortcut icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Moulana PWA Service Worker registered successfully:', reg.scope);
            })
            .catch((err) => {
              console.error('Moulana Service Worker registration failed:', err);
            });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
